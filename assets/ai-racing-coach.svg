<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1180" viewBox="0 0 900 1180" role="img" aria-labelledby="title desc">
  <title id="title">AI-assisted racing coach</title>
  <desc id="desc">Product mockup showing telemetry analysis, lap comparison, and AI coaching cues for simulator and vehicle performance.</desc>
  <defs>
    <linearGradient id="racing-panel" x1="70" y1="78" x2="828" y2="688" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101717"/>
      <stop offset="1" stop-color="#182120"/>
    </linearGradient>
    <linearGradient id="racing-telemetry" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#93f9b9"/>
      <stop offset="0.5" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="racing-window" x1="84" y1="98" x2="816" y2="690" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10201f"/>
      <stop offset="0.55" stop-color="#0c1717"/>
      <stop offset="1" stop-color="#081214"/>
    </linearGradient>
    <linearGradient id="racing-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#152322"/>
      <stop offset="1" stop-color="#0f1919"/>
    </linearGradient>
    <radialGradient id="racing-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="racing-shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="900" height="1180" fill="none"/>

  <g font-family="Inter, Arial, sans-serif">
    <g class="desktop-mockup">
      <ellipse cx="486" cy="386" rx="386" ry="268" fill="url(#racing-glow)"/>
      <rect x="62" y="76" width="776" height="636" rx="30" fill="#071114" filter="url(#racing-shadow)"/>
      <rect x="84" y="98" width="732" height="592" rx="24" fill="url(#racing-window)" stroke="#2f403e" stroke-width="2"/>
      <path d="M108 98h684a24 24 0 0 1 24 24v26H84v-26a24 24 0 0 1 24-24Z" fill="#111d1d"/>
      <path d="M108 99h684" stroke="#f5fbf8" stroke-opacity="0.08" stroke-width="1"/>
      <circle cx="114" cy="123" r="6.5" fill="#a78bfa"/>
      <circle cx="138" cy="123" r="6.5" fill="#67e8f9"/>
      <circle cx="162" cy="123" r="6.5" fill="#93f9b9"/>
      <path d="M84 148h732" stroke="#263331" stroke-width="2"/>

      <g transform="translate(104 210)">
        <text x="0" y="0" fill="#f5fbf8" font-size="32" font-weight="950">AI racing coach</text>
        <text x="0" y="32" fill="#a8b8b5" font-size="16" font-weight="750">Telemetry comparison for simulator sessions and real vehicles</text>
        <g transform="translate(0 64)" font-size="14" font-weight="850">
          <rect width="118" height="38" rx="19" fill="#101717" stroke="#263331" stroke-width="2"/>
          <text x="59" y="25" text-anchor="middle" fill="#f5fbf8">Sim</text>
          <rect x="132" width="136" height="38" rx="19" fill="#101717" stroke="#263331" stroke-width="2"/>
          <text x="200" y="25" text-anchor="middle" fill="#dce7e4">Vehicle</text>
          <rect x="282" width="132" height="38" rx="19" fill="#17231f"/>
          <text x="348" y="25" text-anchor="middle" fill="#67e8f9">Ideal line</text>
          <rect x="428" width="132" height="38" rx="19" fill="#10241d"/>
          <text x="494" y="25" text-anchor="middle" fill="#a78bfa">Driver lap</text>
        </g>
      </g>

      <g transform="translate(104 340)">
        <rect width="448" height="310" rx="24" fill="url(#racing-panel)" stroke="#2f403e" stroke-width="2"/>
        <text x="24" y="40" fill="#dce7e4" font-size="16" font-weight="900">Circuit comparison</text>
        <text x="344" y="282" fill="#a78bfa" font-size="15" font-weight="900">Lap +0.84s</text>
        <path d="M76 188 L118 118 L206 118 C250 118 270 92 322 74 C374 56 398 76 392 118 C386 156 336 164 304 150 C264 132 226 142 206 174 C186 206 154 226 116 218 C80 210 58 216 48 204 C38 192 54 174 76 188Z" fill="none" stroke="#263331" stroke-width="20" stroke-linejoin="round"/>
        <path d="M76 188 L118 118 L206 118 C250 118 270 92 322 74 C374 56 398 76 392 118 C386 156 336 164 304 150 C264 132 226 142 206 174 C186 206 154 226 116 218 C80 210 58 216 48 204 C38 192 54 174 76 188Z" fill="none" stroke="#101717" stroke-width="14" stroke-linejoin="round"/>
        <path d="M76 188 L118 118 L206 118 C250 118 270 92 322 74 C374 56 398 76 392 118 C386 156 336 164 304 150 C264 132 226 142 206 174 C186 206 154 226 116 218 C80 210 58 216 48 204 C38 192 54 174 76 188Z" fill="none" stroke="#f5fbf8" stroke-width="4" stroke-linejoin="round"/>
        <path d="M86 176 L128 104 L210 104 C252 104 278 80 326 64 C376 48 410 72 404 120" fill="none" stroke="#67e8f9" stroke-width="4" stroke-linecap="round" stroke-dasharray="9 8"/>
        <path d="M206 174 C186 206 154 226 116 218" fill="none" stroke="#a78bfa" stroke-width="7" stroke-linecap="round"/>
        <g font-size="13" font-weight="900">
          <circle cx="118" cy="118" r="7" fill="#93f9b9" stroke="#071114" stroke-width="3"/>
          <text x="80" y="100" fill="#93f9b9">S1 -0.08</text>
          <circle cx="322" cy="74" r="7" fill="#93f9b9" stroke="#071114" stroke-width="3"/>
          <text x="292" y="54" fill="#93f9b9">S2 -0.03</text>
          <circle cx="392" cy="118" r="7" fill="#a78bfa" stroke="#071114" stroke-width="3"/>
          <text x="354" y="142" fill="#a78bfa">S3 +0.21</text>
          <circle cx="116" cy="218" r="7" fill="#67e8f9" stroke="#071114" stroke-width="3"/>
          <text x="92" y="252" fill="#67e8f9">S5 +0.40</text>
        </g>
      </g>

      <g transform="translate(576 340)">
        <rect width="220" height="310" rx="24" fill="url(#racing-card)" stroke="#2f403e" stroke-width="2"/>
        <text x="22" y="40" fill="#dce7e4" font-size="16" font-weight="900">Telemetry</text>
        <path d="M24 120h172M24 168h172M24 216h172" stroke="#263331" stroke-width="2"/>
        <path d="M24 206 C52 162 70 180 96 128 C122 76 142 104 196 64" fill="none" stroke="#67e8f9" stroke-width="5" stroke-linecap="round"/>
        <path d="M24 236 C66 220 84 202 118 208 C150 214 160 176 196 172" fill="none" stroke="#93f9b9" stroke-width="4" stroke-linecap="round"/>
        <text x="24" y="266" fill="#67e8f9" font-size="12" font-weight="850">Speed</text>
        <text x="94" y="266" fill="#93f9b9" font-size="12" font-weight="850">Brake</text>
        <rect x="24" y="78" width="150" height="28" rx="14" fill="#10241d"/>
        <text x="42" y="97" fill="#67e8f9" font-size="12" font-weight="900">Late apex detected</text>
      </g>
    </g>

    <g class="companion-mockup" transform="translate(0 -2)">
      <rect x="298" y="738" width="304" height="394" rx="44" fill="#071114" filter="url(#racing-shadow)"/>
      <rect x="314" y="758" width="272" height="354" rx="30" fill="url(#racing-window)"/>
      <path d="M344 759h212" stroke="#f5fbf8" stroke-opacity="0.08"/>
      <text x="338" y="812" fill="#f5fbf8" font-size="29" font-weight="950">Next cue</text>
      <text x="338" y="842" fill="#a8b8b5" font-size="15" font-weight="760">Turn 9 exit, sector 4</text>
      <g transform="translate(338 880)">
        <rect width="224" height="86" rx="20" fill="#17231f"/>
        <text x="20" y="34" fill="#93f9b9" font-size="15" font-weight="900">Brake 8m earlier</text>
        <text x="20" y="62" fill="#dce7e4" font-size="14" font-weight="750">Open steering before throttle</text>
      </g>
      <g transform="translate(338 980)">
        <rect width="102" height="42" rx="21" fill="#10241d"/>
        <text x="51" y="27" fill="#93f9b9" text-anchor="middle" font-size="14" font-weight="900">Attack</text>
        <rect x="116" width="108" height="42" rx="21" fill="#10241d"/>
        <text x="170" y="27" fill="#67e8f9" text-anchor="middle" font-size="14" font-weight="900">+0.84s</text>
      </g>
      <path d="M314 1064h272v18a30 30 0 0 1-30 30H344a30 30 0 0 1-30-30Z" fill="#0d1818"/>
      <path d="M314 1064h272" stroke="#263331" stroke-width="2"/>
      <g fill="none" stroke="#a8b8b5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <g transform="translate(346 1078) scale(0.72)">
          <path d="m15 18-6-6 6-6"/>
        </g>
        <g transform="translate(396 1078) scale(0.72)">
          <path d="m9 18 6-6-6-6"/>
        </g>
        <g transform="translate(462 1078) scale(0.72)">
          <path d="M12 3v12"/>
          <path d="m17 8-5-5-5 5"/>
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        </g>
        <g transform="translate(528 1078) scale(0.72)">
          <rect x="8" y="8" width="14" height="14" rx="2"/>
          <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
        </g>
      </g>
    </g>

    <g class="insight-card" transform="translate(624 810)">
      <rect width="182" height="126" rx="22" fill="url(#racing-card)" stroke="#2f403e" stroke-width="2" filter="url(#racing-shadow)"/>
      <text x="22" y="36" fill="#a8b8b5" font-size="13" font-weight="800">RECOMMENDATION</text>
      <text x="22" y="72" fill="#f5fbf8" font-size="25" font-weight="950">Late apex</text>
      <text x="22" y="98" fill="#67e8f9" font-size="13" font-weight="850">S4-S5 priority</text>
    </g>
  </g>
</svg>
