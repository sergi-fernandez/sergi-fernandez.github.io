    <g class="companion-mockup" transform="translate(0 12)">
      <rect x="302" y="738" width="296" height="386" rx="44" fill="#071114" filter="url(#driver-shadow)"/>
      <rect x="318" y="758" width="264" height="346" rx="30" fill="url(#driver-window)"/>
      <path d="M348 759h204" stroke="#f5fbf8" stroke-opacity="0.08"/>
      <text x="342" y="812" fill="#f5fbf8" font-size="31" font-weight="950">Quest</text>
      <text x="342" y="842" fill="#a8b8b5" font-size="16" font-weight="760">Use cruise control</text>
      <g transform="translate(334 878)">
        <rect width="232" height="88" rx="20" fill="#17231f"/>
        <text x="20" y="38" fill="#a8b8b5" font-size="14" font-weight="800">Progress this week</text>
        <text x="212" y="40" text-anchor="end" fill="#f5fbf8" font-size="22" font-weight="950">68%</text>
        <rect x="20" y="58" width="192" height="12" rx="6" fill="#263331"/>
        <rect x="20" y="58" width="130" height="12" rx="6" fill="#93f9b9"/>
      </g>
      <g transform="translate(342 992)">
        <rect width="216" height="42" rx="21" fill="#f5fbf8"/>
        <text x="108" y="27" text-anchor="middle" fill="#071114" font-size="15" font-weight="900">Open lesson</text>
      </g>
      <path d="M318 1062h264v12a30 30 0 0 1-30 30H348a30 30 0 0 1-30-30Z" fill="#0d1818"/>
      <path d="M318 1062h264" stroke="#263331" stroke-width="2"/>
      <g fill="none" stroke="#a8b8b5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <g transform="translate(346 1075) scale(0.72)">
          <path d="m15 18-6-6 6-6"/>
        </g>
        <g transform="translate(396 1075) scale(0.72)">
          <path d="m9 18 6-6-6-6"/>
        </g>
        <g transform="translate(462 1075) scale(0.72)">
          <path d="M12 3v12"/>
          <path d="m17 8-5-5-5 5"/>
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        </g>
        <g transform="translate(526 1075) scale(0.72)">
          <rect x="8" y="8" width="14" height="14" rx="2"/>
          <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
        </g>
      </g>
    </g>

    <g class="insight-card" transform="translate(616 818)">
      <rect width="180" height="116" rx="20" fill="url(#driver-card)" stroke="#2f403e" stroke-width="2" filter="url(#driver-shadow)"/>
      <text x="22" y="35" fill="#a8b8b5" font-size="13" font-weight="800">TARGET IMPACT</text>
      <text x="22" y="78" fill="#f5fbf8" font-size="34" font-weight="950">15%</text>
      <circle cx="136" cy="66" r="22" fill="#10241d"/>
      <path d="M125 67l8 8 18-22" fill="none" stroke="#93f9b9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
